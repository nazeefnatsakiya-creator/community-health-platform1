version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chp_user
      POSTGRES_PASSWORD: chp_pass
      POSTGRES_MULTIPLE_DATABASES: chp_personal,chp_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      PERSONAL_DB_URL: postgresql://chp_user:chp_pass@postgres:5432/chp_personal
      ANALYTICS_DB_URL: postgresql://chp_user:chp_pass@postgres:5432/chp_analytics
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
